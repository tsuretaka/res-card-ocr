services:
  - type: web
    name: res-card-ocr
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GCP_SERVICE_ACCOUNT_JSON
        sync: false
